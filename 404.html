<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Indisponible - Timéo Photographie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            /* Arrière-plan nature épuré avec un léger flou */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        /* Conteneur principal épuré */
        .card {
            background: rgba(255, 255, 255, 0.03); /* Presque invisible */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Icone minimaliste de chargement */
        .loader {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 25px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h1 {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        p {
            font-weight: 300;
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Bouton minimaliste */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #ffffff;
            color: #333;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 400;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255,255,255,0.8);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="loader"></div>
        <h1>Station Hors Ligne</h1>
        <p>Mon serveur personnel est momentanément éteint. Redirection automatique vers mon site principal...</p>
        <a href="https://timeo-photographie-4.webnode.fr/" class="btn">
            Retour Immédiat (<span id="countdown">10</span>s)
        </a>
    </div>

    <script>
        // Script de redirection automatique après 10 secondes
        let target = "https://timeo-photographie-4.webnode.fr/";
        let seconds = 10;
        let countdownEl = document.getElementById('countdown');

        let interval = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = target;
            }
        }, 1000);
    </script>

</body>
</html>
