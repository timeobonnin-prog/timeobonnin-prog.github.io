<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station indisponible</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #0f172a;
            color: #f8fafc;
        }

        /* Arrière-plan animé et flou */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob {
            position: absolute;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blob1 {
            width: 400px;
            height: 400px;
            top: -10%;
            left: -10%;
        }

        .blob2 {
            width: 500px;
            height: 500px;
            bottom: -20%;
            right: -10%;
            background: linear-gradient(45deg, #ec4899, #8b5cf6);
            animation-duration: 25s;
            animation-delay: -5s;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 50px) scale(1.2); }
            100% { transform: translate(-50px, 100px) scale(0.8); }
        }

        /* Carte de contenu */
        .card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #f1f5f9;
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* Bouton stylisé */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <div class="card">
        <h1>La station n'est pas disponible</h1>
        <p>Mon serveur personnel est actuellement éteint ou le tunnel est arrêté. Le site sera de nouveau accessible dès qu'il sera allumé.</p>
        <a href="https://timeo-photographie-4.webnode.fr/" class="btn">Retourner sur mon site</a>
    </div>

</body>
</html>
