<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Birdnet-Go — Le Lac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        html { display: none; }
    </style>
    <script>
        if (self === top) {
            document.documentElement.style.display = 'block';
        } else {
            top.location = self.location;
        }
    </script>

    <style>
        :root {
            --primary-glow: #0ea5e9; 
            --secondary-glow: #38bdf8;
            --bg-color: #031e30;
            --card-bg: rgba(3, 30, 48, 0.45);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f9ff;
            --text-secondary: #7dd3fc;
            --error-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 30%, #0c2d48 0%, #02111a 100%);
            font-family: "Plus Jakarta Sans", sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* --- EFFETS AMBIANTS DU LAC --- */
        .ambient-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        
        .evaporation {
            position: absolute;
            bottom: 0;
            width: 1.5px;
            height: 1.5px;
            background: rgba(56, 189, 248, 0.2);
            border-radius: 50%;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(10vh) scale(1); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(2); opacity: 0; }
        }

        .drop-rain {
            position: absolute;
            width: 1px;
            height: 15px;
            background: linear-gradient(to bottom, transparent, rgba(56, 189, 248, 0.3));
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh); }
            100% { transform: translateY(110vh); }
        }

        /* --- PERCHE --- */
        .perch-line {
            position: absolute;
            top: 180px;
            right: 0;
            width: 200px;
            height: 1px;
            background: linear-gradient(to left, rgba(255,255,255,0.15), transparent);
            z-index: 5;
            pointer-events: none;
        }

        /* --- MARTIN-PÊCHEUR --- */
        .kingfisher-container {
            position: absolute;
            top: 112px;
            right: 40px;
            width: 90px;
            height: 90px;
            z-index: 30;
            cursor: pointer;
            transform: scaleX(-1);
            animation: gentle-breath 4s ease-in-out infinite;
            transition: transform 0.2s;
            pointer-events: auto;
        }

        @keyframes gentle-breath {
            0%, 100% { transform: scaleX(-1) translateY(0); }
            50% { transform: scaleX(-1) translateY(-3px); }
        }

        .kingfisher-container.diving {
            animation: dive-action 1.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes dive-action {
            0% { transform: scaleX(-1) translate(0, 0) rotate(0deg); }
            25% { transform: scaleX(-1) translate(-140px, 320px) rotate(-55deg) scale(0.9); }
            45% { transform: scaleX(-1) translate(-160px, 330px) rotate(-20deg) scale(0.9); }
            100% { transform: scaleX(-1) translate(0, 0) rotate(0deg); }
        }

        /* --- POISSONS --- */
        .fish-layer {
            position: absolute;
            bottom: 6%;
            width: 100%;
            height: 15%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.25;
        }
        .fish {
            position: absolute;
            animation: swim linear infinite;
        }
        @keyframes swim {
            0% { transform: translateX(-50px) scaleX(-1); }
            100% { transform: translateX(110vw) scaleX(-1); }
        }

        /* --- INTERFACE CARD --- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            pointer-events: none;
        }

        .redirect-card {
            width: 100%;
            max-width: 380px;
            padding: 45px 35px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: card-appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }

        @keyframes card-appear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: rgba(14, 165, 233, 0.08);
            border: 1px solid rgba(14, 165, 233, 0.2);
            color: var(--secondary-glow);
            margin-bottom: 24px;
            display: flex; align-items: center; justify-content: center;
        }

        h1 {
            font-family: "Outfit", sans-serif;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #fff;
        }

        .state-container { display: none; width: 100%; flex-direction: column; align-items: center; }
        .state-container.active { display: flex; }

        .spinner {
            width: 32px; height: 32px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top-color: var(--secondary-glow);
            border-radius: 50%;
            margin: 40px 0;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 12px; font-weight: 400; }
        .status-text { color: #64748b; font-size: 0.85rem; }

        .destination-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 100px;
            margin-bottom: 28px; color: var(--text-secondary); font-size: 0.8rem;
            text-decoration: none; font-weight: 500; cursor: pointer;
            transition: all 0.2s;
        }
        .destination-badge:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(56, 189, 248, 0.3);
        }
        
        .copy-icon-wrapper { display: flex; align-items: center; }
        .check-icon { display: none; stroke: #10b981; }
        .destination-badge.copied .copy-icon { display: none; }
        .destination-badge.copied .check-icon { display: inline; }

        .countdown-wheel { position: relative; width: 90px; height: 90px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
        .circle-progress { stroke-dasharray: 100.53; stroke-dashoffset: 0; transform: rotate(-90deg); transform-origin: center; }
        .circle-progress.active { animation: countdown-circle 8s linear forwards; }
        @keyframes countdown-circle { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 100.53; } }
        .countdown-number { position: absolute; font-size: 2.2rem; font-weight: 500; color: #fff; font-family: "Outfit", sans-serif; }
        .countdown-caption { font-size: 0.8rem; color: #64748b; margin-bottom: 24px; }

        .action-btn {
            width: 100%; padding: 14px; border-radius: 14px;
            font-size: 0.9rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: 0.2s;
            background: #fff; color: #02111a; text-align: center;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .action-btn:hover { background: #e2e8f0; transform: translateY(-1px); }

        .error-icon-wrapper {
            color: var(--error-color);
            margin: 20px 0 15px 0;
        }
        .error-title { font-size: 1.2rem; color: var(--error-color); font-weight: 600; margin-bottom: 8px; }
        .error-message { color: #64748b; font-size: 0.85rem; line-height: 1.4; margin-bottom: 20px; }
        .retry-btn { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .retry-btn:hover { background: rgba(239, 68, 68, 0.2); color: #fff; }
    </style>
</head>
<body>

    <div class="perch-line"></div>

    <div class="kingfisher-container" id="kingfisher">
        <svg viewBox="0 0 120 120" width="100%" height="100%">
            <defs>
                <linearGradient id="feather-blue" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#00e5ff"/>
                    <stop offset="100%" stop-color="#0066cc"/>
                </linearGradient>
                <linearGradient id="belly-orange" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ff9100"/>
                    <stop offset="100%" stop-color="#d84315"/>
                </linearGradient>
            </defs>
            <path d="M52,45 C65,45 76,58 74,82 C72,92 64,102 54,102 C46,92 45,72 52,45 Z" fill="url(#belly-orange)" />
            <path d="M66,52 C71,54 73,58 70,62 C66,59 64,55 66,52 Z" fill="#ffffff" opacity="0.9"/>
            <path d="M48,28 C62,28 66,36 65,46 C60,58 50,75 48,98 L41,101 L39,88 C36,68 38,43 48,28 Z" fill="url(#feather-blue)" />
            <path d="M48,28 C59,28 65,35 64,44 C57,42 52,37 48,28 Z" fill="#00e5ff" />
            <path d="M62,40 L104,44 L61,46 Z" fill="#1e293b" />
            <circle cx="56" cy="37" r="2" fill="#ffffff" />
            <circle cx="56" cy="37" r="0.9" fill="#0f172a" />
        </svg>
    </div>

    <div class="ambient-layer" id="ambientLayer"></div>
    <div class="fish-layer" id="fishLayer"></div>

    <div class="container">
        <div class="redirect-card">
            <div class="logo-wrapper">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z" />
                </svg>
            </div>

            <h1>Birdnet-Go Timéo</h1>

            <div id="state-loading" class="state-container active">
                <div class="spinner"></div>
                <p class="status-text">Connexion au lac en cours...</p>
            </div>

            <div id="state-countdown" class="state-container">
                <p class="subtitle">Vous allez être redirigé vers</p>
                
                <button id="copy-badge" type="button" class="destination-badge" title="Copier l'adresse">
                    <span>🔗</span>
                    <span id="destination-name">...</span>
                    <span class="copy-icon-wrapper">
                        <svg class="copy-icon" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        <svg class="check-icon" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                </button>

                <div class="countdown-wheel">
                    <svg viewBox="0 0 36 36" width="90" height="90">
                        <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2"/>
                        <circle id="progress-circle" class="circle-progress" cx="18" cy="18" r="16" fill="none" stroke="var(--secondary-glow)" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <div class="countdown-number" id="countdown-num">8</div>
                </div>
                
                <p class="countdown-caption">Redirection automatique...</p>

                <a id="direct-btn" href="#" class="action-btn" rel="noopener noreferrer">
                    <span>Y aller maintenant</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </a>
            </div>

            <div id="state-error" class="state-container">
                <div class="error-icon-wrapper">
                    <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
                <h3 class="error-title">Lac introuvable</h3>
                <p class="error-message" id="error-desc">Impossible de joindre le serveur de redirection ou tunnel non configuré.</p>
                <button id="retry-btn" type="button" class="action-btn retry-btn">Réessayer</button>
            </div>
        </div>
    </div>

    <script>
        // Sécurité obfusquée de l'URL brute du Gist (Masque la structure du lien face aux parseurs de bots simples)
        const _0x1a2b = "aHR0cHM6Ly9naXN0LmdpdGh1YnVzZXJjb250ZW50LmNvbS90aW1lb2Jvbm5pbi1wcm9nL2U5YjQ4MTE3MTc2MThhMjAwZTNlMjQ0N2Q1NTMzNDhmL3Jhdy90dW5uZWwudHh0";
        const FETCH_URL = window.atob(_0x1a2b);

        const ambientLayer = document.getElementById('ambientLayer');
        const fishLayer = document.getElementById('fishLayer');
        const kingfisher = document.getElementById('kingfisher');
        
        let countdownInterval = null;
        let targetRedirectUrl = '';

        // --- ANIMATIONS VISUELLES ---
        function initAmbient() {
            ambientLayer.innerHTML = '';
            for(let i = 0; i < 35; i++) {
                let drop = document.createElement('div');
                drop.className = 'drop-rain';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (0.6 + Math.random() * 0.6) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                ambientLayer.appendChild(drop);
            }
            for(let i = 0; i < 20; i++) {
                let v = document.createElement('div');
                v.className = 'evaporation';
                v.style.left = Math.random() * 100 + 'vw';
                v.style.animationDuration = (4 + Math.random() * 4) + 's';
                v.style.animationDelay = Math.random() * 3 + 's';
                ambientLayer.appendChild(v);
            }
        }

        function initFishes() {
            fishLayer.innerHTML = '';
            for(let i = 0; i < 3; i++) {
                let fish = document.createElement('div');
                fish.className = 'fish';
                fish.style.top = Math.random() * 100 + '%';
                fish.style.animationDuration = (12 + Math.random() * 8) + 's';
                fish.style.animationDelay = Math.random() * 4 + 's';
                fish.innerHTML = `<svg viewBox="0 0 30 15" width="25" height="12"><path d="M2,7 C10,2 20,2 25,7 C20,12 10,12 2,7 Z" fill="rgba(56, 189, 248, 0.4)"/><path d="M24,7 L30,3 L29,11 Z" [...]`;
                fishLayer.appendChild(fish);
            }
        }

        function dive() {
            if (!kingfisher.classList.contains('diving')) {
                kingfisher.classList.add('diving');
                setTimeout(() => kingfisher.classList.remove('diving'), 1800);
            }
        }
        
        kingfisher.addEventListener('click', (e) => {
            e.stopPropagation();
            dive();
        });
        setInterval(dive, 14000);

        // --- LOGIQUE DES ÉTATS DE L'UI ---
        function showState(stateName) {
            document.querySelectorAll('.state-container').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`state-${stateName}`);
            if (target) target.classList.add('active');
        }

        // --- LOGIQUE DE COPIE CLIPBOARD ---
        const copyBadge = document.getElementById('copy-badge');
        if (copyBadge) {
            copyBadge.addEventListener('click', async () => {
                if (!targetRedirectUrl) return;
                try {
                    await navigator.clipboard.writeText(targetRedirectUrl);
                    copyBadge.classList.add('copied');
                    setTimeout(() => copyBadge.classList.remove('copied'), 2000);
                } catch (err) {
                    console.error('Erreur lors du copier: ', err);
                }
            });
        }

        // --- RECUPERATION DU GIST ET REDIRECTION ---
        async function fetchDestination() {
            showState('loading');
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('progress-circle').classList.remove('active');

            try {
                await new Promise(resolve => setTimeout(resolve, 1000));

                const response = await fetch(FETCH_URL);
                if (!response.ok) {
                    throw new Error(`Erreur serveur (${response.status})`);
                }
                
                const rawUrl = await response.text();
                const targetUrl = rawUrl.trim();
                
                if (!targetUrl || targetUrl === '...' || targetUrl === '') {
                    throw new Error("L'URL configurée dans tunnel.txt est vide ou invalide.");
                }

                // Sécurité : Bloque l'injection de protocoles arbitraires (ex: javascript:alert(1))
                if (targetUrl.toLowerCase().startsWith('javascript:') || targetUrl.toLowerCase().startsWith('data:')) {
                    throw new Error("Protocole non sécurisé détecté.");
                }

                // Validation syntaxique de l'URL cible
                try {
                    new URL(targetUrl.includes('://') ? targetUrl : 'http://' + targetUrl);
                } catch (_) {
                    throw new Error("Le format brut de l'adresse distante est corrompu.");
                }
                
                startCountdown(targetUrl);
            } catch (err) {
                console.error("Redirection error:", err);
                let message = "Impossible de récupérer l'adresse de destination.";
                message = `${message} (${err.message}). Vérifie la configuration de ton fichier tunnel.txt.`;
                
                // Sécurité contextuelle : Injection propre sans utiliser innerHTML
                document.getElementById('error-desc').textContent = message;
                showState('error');
            }
        }

        function startCountdown(url) {
            targetRedirectUrl = url;
            showState('countdown');
            
            const destNameEl = document.getElementById('destination-name');
            try {
                if (url.startsWith('http://') || url.startsWith('https://')) {
                    const parsed = new URL(url);
                    destNameEl.textContent = parsed.hostname + (parsed.port ? `:${parsed.port}` : '');
                } else {
                    destNameEl.textContent = url;
                }
            } catch (e) {
                // Nettoyage préventif des caractères hors-normes URL pour l'affichage textuel
                destNameEl.textContent = url.replace(/[^\w\.\:\-\/]/gi, '');
            }

            document.getElementById('direct-btn').href = url;
            
            const progressCircle = document.getElementById('progress-circle');
            progressCircle.style.animation = 'none';
            progressCircle.offsetHeight; /* trigger reflow */
            progressCircle.style.animation = null;
            progressCircle.classList.add('active');
            
            let count = 8; 
            const countdownNum = document.getElementById('countdown-num');
            countdownNum.textContent = count;
            
            countdownInterval = setInterval(() => {
                count--;
                countdownNum.textContent = count;
                
                if (count <= 0) {
                    clearInterval(countdownInterval);
                    // Sécurité d'exécution : location.replace empêche l'accumulation de boucles dans l'historique du navigateur
                    window.location.replace(url);
                }
            }, 1000);
        }

        document.getElementById('retry-btn').addEventListener('click', fetchDestination);

        window.addEventListener('DOMContentLoaded', () => {
            initAmbient();
            initFishes();
            fetchDestination();
        });
    </script>

    <!-- Ajout : écume des berges + loutre - inséré automatiquement -->
    <style>
      /* Foam layer (bordures du lac) */
      .foam-layer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 4%;
        height: 12%;
        pointer-events: none;
        z-index: 6; /* au-dessus des poissons (z-index:2), sous la carte (z-index:10+) */
        overflow: visible;
      }
      .foam-piece {
        position: absolute;
        bottom: 0;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.55) 40%, rgba(255,255,255,0.0) 60%);
        filter: blur(0.6px);
        opacity: 0.85;
        transform: translateY(6px) scale(1);
        animation: foam-bob 3.5s ease-in-out infinite;
        mix-blend-mode: screen;
      }
      @keyframes foam-bob {
        0% { transform: translateY(6px) scale(0.9); opacity: 0.7; }
        50% { transform: translateY(-4px) scale(1.05); opacity: 1; }
        100% { transform: translateY(6px) scale(0.95); opacity: 0.7; }
      }

      /* Slight clusters for shoreline look */
      .foam-cluster { position: absolute; bottom: 0; pointer-events: none; }

      /* Otter (loutre) */
      .otter-container {
        position: absolute;
        left: 22px;
        bottom: 6%;
        width: 110px;
        height: 70px;
        z-index: 22; /* au-dessus des poissons, sous la carte */
        pointer-events: auto;
        cursor: pointer;
        transform-origin: center bottom;
        transition: transform 0.2s ease;
      }
      .otter-svg { width: 100%; height: 100%; display: block; }
      .otter-bob { animation: otter-bob 4.2s ease-in-out infinite; transform-origin: center center; }
      @keyframes otter-bob {
        0% { transform: translateY(0) rotate(-1deg); }
        50% { transform: translateY(-6px) rotate(1.2deg); }
        100% { transform: translateY(0) rotate(-1deg); }
      }

      /* Otter swim/dive action */
      .otter-container.swim {
        animation: otter-swim 2.2s cubic-bezier(.2,.9,.3,1) forwards;
      }
      @keyframes otter-swim {
        0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
        30% { transform: translateX(140px) translateY(-48px) rotate(-12deg) scale(0.95); }
        60% { transform: translateX(220px) translateY(-30px) rotate(6deg) scale(0.9); opacity: 0.9; }
        100% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
      }

      /* Small accessible helper */
      .sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    </style>

    <div class="foam-layer" id="foamLayer" aria-hidden="true"></div>

    <div class="otter-container" id="otter" role="button" aria-label="Loutre du lac - cliquer pour qu'elle nage">
      <svg class="otter-svg" viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- simple silhouette stylisée d'une loutre -->
        <g class="otter-bob" fill="none" stroke="none">
          <!-- corps -->
          <ellipse cx="110" cy="82" rx="58" ry="28" fill="#6B3F26"/>
          <!-- tête -->
          <ellipse cx="66" cy="68" rx="28" ry="22" fill="#6B3F26"/>
          <!-- ventre plus clair -->
          <ellipse cx="110" cy="88" rx="36" ry="16" fill="#8f5f3f"/>
          <!-- oreille -->
          <circle cx="50" cy="54" r="5" fill="#5b3723"/>
          <!-- oeil -->
          <circle cx="74" cy="66" r="3" fill="#0b1720"/>
          <!-- nez -->
          <circle cx="56" cy="74" r="3" fill="#0b1720"/>
          <!-- queue stylisée -->
          <path d="M164 92 C186 92 202 80 212 68 L206 84 C196 94 176 102 164 92 Z" fill="#6B3F26"/>
          <!-- reflets légers -->
          <path d="M92 80 C100 74 116 74 126 80" stroke="rgba(255,255,255,0.06)" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <span class="sr-only" id="otterStatus" aria-live="polite"></span>

    <script>
      (function () {
        const foamLayer = document.getElementById('foamLayer');
        const otter = document.getElementById('otter');
        const otterStatus = document.getElementById('otterStatus');

        function randomBetween(min, max) { return Math.random() * (max - min) + min; }

        function createFoamPieces() {
          if (!foamLayer) return;
          foamLayer.innerHTML = '';

          // clusters near left and right banks
          const clusters = [
            { anchor: 'left', count: 16, spreadVw: 16, offset: 2 },
            { anchor: 'right', count: 14, spreadVw: 16, offset: 2 }
          ];

          clusters.forEach(cluster => {
            const clusterEl = document.createElement('div');
            clusterEl.className = 'foam-cluster';
            // position cluster container
            if (cluster.anchor === 'left') {
              clusterEl.style.left = `${cluster.offset}px`;
            } else {
              clusterEl.style.right = `${cluster.offset}px`;
            }
            clusterEl.style.bottom = '0';
            clusterEl.style.width = `${cluster.spreadVw}vw`;
            clusterEl.style.height = '60px';
            clusterEl.style.pointerEvents = 'none';
            clusterEl.style.overflow = 'visible';

            for (let i = 0; i < cluster.count; i++) {
              const p = document.createElement('div');
              p.className = 'foam-piece';
              const size = Math.round(randomBetween(6, 18));
              p.style.width = size + 'px';
              p.style.height = size + 'px';
              // position inside cluster (x)
              const x = Math.round(randomBetween(0, cluster.spreadVw));
              p.style.left = cluster.anchor === 'left' ? `${x}px` : `calc(100% - ${x}px)`;
              // slight individual timing
              p.style.animationDuration = `${randomBetween(2.6, 5.2)}s`;
              p.style.animationDelay = `${randomBetween(0, 2)}s`;
              p.style.opacity = `${randomBetween(0.5, 1)}`;
              clusterEl.appendChild(p);
            }

            foamLayer.appendChild(clusterEl);
          });
        }

        // occasional subtle refresh so foam doesn't look too repetitive
        function scheduleFoamRefresh() {
          createFoamPieces();
          setTimeout(scheduleFoamRefresh, 7000 + Math.random() * 8000);
        }

        // otter interactions
        let otterBusy = false;
        function otterSwimAction() {
          if (otterBusy) return;
          otterBusy = true;
          otter.classList.add('swim');
          otterStatus.textContent = 'La loutre file sur l\'eau.';
          setTimeout(() => {
            otter.classList.remove('swim');
            otterStatus.textContent = 'La loutre se repose.';
            otterBusy = false;
          }, 2200);
        }

        // click or touch triggers swim
        otter.addEventListener('click', (e) => {
          e.stopPropagation();
          otterSwimAction();
        });
        otter.addEventListener('touchstart', (e) => {
          e.stopPropagation();
          otterSwimAction();
        }, {passive: true});

        // init on DOM ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => {
            createFoamPieces();
            scheduleFoamRefresh();
          });
        } else {
          createFoamPieces();
          scheduleFoamRefresh();
        }
      })();
    </script>
</body>
</html>
