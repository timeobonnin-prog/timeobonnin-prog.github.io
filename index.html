<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Birdnet-Go — Redirection</title>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="container">
    <div class="redirect-card">
      <div class="logo-wrapper">
        <svg class="bird-logo" viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z" />
        </svg>
      </div>

      <h1>Birdnet-Go Timéo</h1>
      <div id="state-loading" class="state-container active">
        <div class="spinner">
          <div class="double-bounce1"></div>
          <div class="double-bounce2"></div>
        </div>
        <p class="status-text">Recherche de la destination...</p>
      </div>
      <div id="state-countdown" class="state-container">
        <p class="subtitle">Vous allez être redirigé vers</p>
        <button id="copy-badge" type="button" class="destination-badge" title="Copier l'adresse" aria-label="Copier l'adresse de destination">
          <span class="destination-icon">🔗</span>
          <span id="destination-name" class="destination-name">Birdnet-Go</span>
          <span class="copy-icon-wrapper">
            <svg class="copy-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <svg class="check-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </span>
        </button>
        
        <div class="countdown-wheel">
          <svg viewBox="0 0 36 36" width="120" height="120">
            <defs>
              <linearGradient id="countdown-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#10b981" />
                <stop offset="100%" stop-color="#06b6d4" />
              </linearGradient>
            </defs>
            <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
            <circle id="progress-circle" class="circle-progress" cx="18" cy="18" r="16" fill="none" stroke="url(#countdown-grad)" stroke-width="2.5"
              stroke-linecap="round" stroke-dasharray="100.53" stroke-dashoffset="0" transform="rotate(-90 18 18)"/>
          </svg>
          <div class="countdown-number" id="countdown-num">3</div>
        </div>
        
        <p class="countdown-caption">Redirection automatique en cours...</p>
        
        <a id="direct-btn" href="#" class="action-btn primary-btn">
          <span>Y aller maintenant</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
      </div>
      <div id="state-error" class="state-container">
        <div class="error-icon-wrapper">
          <svg class="error-icon" viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
        </div>
        <h3>Erreur de redirection</h3>
        <p class="error-message" id="error-desc">Impossible de joindre le serveur de redirection.</p>
        <button id="retry-btn" type="button" class="action-btn primary-btn" style="margin-top: 10px; width: auto; min-width: 140px;">
          <span>Réessayer</span>
        </button>
      </div>

    </div>
  </div>

  <script>
    const FETCH_URL = 'https://gist.githubusercontent.com/timeobonnin-prog/e9b4811717618a200e3e2447d553348f/raw/tunnel.txt';

    function showState(stateName) {
      document.querySelectorAll('.state-container').forEach(el => {
        el.classList.remove('active');
      });
      const target = document.getElementById(`state-${stateName}`);
      if (target) {
        target.classList.add('active');
      }
    }

    async function fetchDestination() {
      showState('loading');
      try {
        await new Promise(resolve => setTimeout(resolve, 800));

        const response = await fetch(FETCH_URL);
        if (!response.ok) {
          throw new Error(`Erreur serveur (${response.status})`);
        }
        
        const rawUrl = await response.text();
        const targetUrl = rawUrl.trim();
        
        if (!targetUrl || targetUrl === '...' || targetUrl === '') {
          throw new Error("L'URL configurée est vide ou invalide.");
        }
        
        startCountdown(targetUrl);
      } catch (err) {
        console.error("Redirection error:", err);
        
        let message = "Impossible de récupérer l'adresse de destination de Birdnet-Go.";
        if (FETCH_URL === '...') {
          message = "L'adresse de redirection n'est pas encore configurée (valeur '...').";
        } else {
          message = `${message} (${err.message})`;
        }
        
        document.getElementById('error-desc').textContent = message;
        showState('error');
      }
    }

    let countdownInterval = null;
    let targetRedirectUrl = '';

    // Clipboad copy logic
    const copyBadge = document.getElementById('copy-badge');
    if (copyBadge) {
      copyBadge.addEventListener('click', async () => {
        if (!targetRedirectUrl) return;
        try {
          await navigator.clipboard.writeText(targetRedirectUrl);
          copyBadge.classList.add('copied');
          setTimeout(() => {
            copyBadge.classList.remove('copied');
          }, 2000);
        } catch (err) {
          console.error('Failed to copy destination URL: ', err);
        }
      });
    }

    function startCountdown(url) {
      targetRedirectUrl = url;
      showState('countdown');
      
      const destNameEl = document.getElementById('destination-name');
      try {
        if (url.startsWith('http://') || url.startsWith('https://')) {
          const parsed = new URL(url);
          destNameEl.textContent = parsed.hostname + (parsed.port ? `:${parsed.port}` : '');
        } else {
          destNameEl.textContent = url;
        }
      } catch (e) {
        destNameEl.textContent = url;
      }

      const directBtn = document.getElementById('direct-btn');
      directBtn.href = url;
      
      const progressCircle = document.getElementById('progress-circle');
      progressCircle.classList.add('active');
      
      let count = 3;
      const countdownNum = document.getElementById('countdown-num');
      countdownNum.textContent = count;
      
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
      
      countdownInterval = setInterval(() => {
        count--;
        countdownNum.textContent = count;
        
        if (count <= 0) {
          clearInterval(countdownInterval);
          window.location.href = url;
        }
      }, 1000);
    }

    const retryBtn = document.getElementById('retry-btn');
    if (retryBtn) {
      retryBtn.addEventListener('click', () => {
        fetchDestination();
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      fetchDestination();
    });
  </script>
</body>
</html>
