<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Birdnet-Go — Le Lac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        html { display: none; }
    </style>
    <script>
        if (self === top) {
            document.documentElement.style.display = 'block';
        } else {
            top.location = self.location;
        }
    </script>

    <style>
        :root {
            --primary-glow: #0ea5e9; 
            --secondary-glow: #38bdf8;
            --bg-color: #031e30;
            --card-bg: rgba(3, 30, 48, 0.45);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f9ff;
            --text-secondary: #7dd3fc;
            --error-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 30%, #0c2d48 0%, #02111a 100%);
            font-family: "Plus Jakarta Sans", sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* --- EFFETS AMBIANTS DU LAC --- */
        .ambient-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        
        .evaporation {
            position: absolute;
            bottom: 0;
            width: 1.5px;
            height: 1.5px;
            background: rgba(56, 189, 248, 0.2);
            border-radius: 50%;
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(10vh) scale(1); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(2); opacity: 0; }
        }

        .drop-rain {
            position: absolute;
            width: 1px;
            height: 15px;
            background: linear-gradient(to bottom, transparent, rgba(56, 189, 248, 0.3));
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh); }
            100% { transform: translateY(110vh); }
        }

        /* --- PERCHE --- */
        .perch-line {
            position: absolute;
            top: 180px;
            right: 0;
            width: 200px;
            height: 1px;
            background: linear-gradient(to left, rgba(255,255,255,0.15), transparent);
            z-index: 5;
            pointer-events: none;
        }

        /* --- MARTIN-PÊCHEUR --- */
        .kingfisher-container {
            position: absolute;
            top: 112px;
            right: 40px;
            width: 90px;
            height: 90px;
            z-index: 30;
            cursor: pointer;
            transform: scaleX(-1);
            animation: gentle-breath 4s ease-in-out infinite;
            transition: transform 0.2s;
            pointer-events: auto;
        }

        @keyframes gentle-breath {
            0%, 100% { transform: scaleX(-1) translateY(0); }
            50% { transform: scaleX(-1) translateY(-3px); }
        }

        .kingfisher-container.diving {
            animation: dive-action 1.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes dive-action {
            0% { transform: scaleX(-1) translate(0, 0) rotate(0deg); }
            25% { transform: scaleX(-1) translate(-140px, 320px) rotate(-55deg) scale(0.9); }
            45% { transform: scaleX(-1) translate(-160px, 330px) rotate(-20deg) scale(0.9); }
            100% { transform: scaleX(-1) translate(0, 0) rotate(0deg); }
        }

        /* --- POISSONS --- */
        .fish-layer {
            position: absolute;
            bottom: 6%;
            width: 100%;
            height: 15%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.25;
        }
        .fish {
            position: absolute;
            animation: swim linear infinite;
        }
        @keyframes swim {
            0% { transform: translateX(-50px) scaleX(-1); }
            100% { transform: translateX(110vw) scaleX(-1); }
        }

        /* --- INTERFACE CARD --- */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            pointer-events: none;
        }

        .redirect-card {
            width: 100%;
            max-width: 380px;
            padding: 45px 35px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: card-appear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }

        @keyframes card-appear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: rgba(14, 165, 233, 0.08);
            border: 1px solid rgba(14, 165, 233, 0.2);
            color: var(--secondary-glow);
            margin-bottom: 24px;
            display: flex; align-items: center; justify-content: center;
        }

        h1 {
            font-family: "Outfit", sans-serif;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #fff;
        }

        .state-container { display: none; width: 100%; flex-direction: column; align-items: center; }
        .state-container.active { display: flex; }

        .spinner {
            width: 32px; height: 32px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top-color: var(--secondary-glow);
            border-radius: 50%;
            margin: 40px 0;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 12px; font-weight: 400; }
        .status-text { color: #64748b; font-size: 0.85rem; }

        .destination-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 100px;
            margin-bottom: 28px; color: var(--text-secondary); font-size: 0.8rem;
            text-decoration: none; font-weight: 500; cursor: pointer;
            transition: all 0.2s;
        }
        .destination-badge:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(56, 189, 248, 0.3);
        }
        
        .copy-icon-wrapper { display: flex; align-items: center; }
        .check-icon { display: none; stroke: #10b981; }
        .destination-badge.copied .copy-icon { display: none; }
        .destination-badge.copied .check-icon { display: inline; }

        .countdown-wheel { position: relative; width: 90px; height: 90px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; }
        .circle-progress { stroke-dasharray: 100.53; stroke-dashoffset: 0; transform: rotate(-90deg); transform-origin: center; }
        .circle-progress.active { animation: countdown-circle 8s linear forwards; }
        @keyframes countdown-circle { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 100.53; } }
        .countdown-number { position: absolute; font-size: 2.2rem; font-weight: 500; color: #fff; font-family: "Outfit", sans-serif; }
        .countdown-caption { font-size: 0.8rem; color: #64748b; margin-bottom: 24px; }

        .action-btn {
            width: 100%; padding: 14px; border-radius: 14px;
            font-size: 0.9rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: 0.2s;
            background: #fff; color: #02111a; text-align: center;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .action-btn:hover { background: #e2e8f0; transform: translateY(-1px); }

        .error-icon-wrapper {
            color: var(--error-color);
            margin: 20px 0 15px 0;
        }
        .error-title { font-size: 1.2rem; color: var(--error-color); font-weight: 600; margin-bottom: 8px; }
        .error-message { color: #64748b; font-size: 0.85rem; line-height: 1.4; margin-bottom: 20px; }
        .retry-btn { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .retry-btn:hover { background: rgba(239, 68, 68, 0.2); color: #fff; }

        /* --- ÉLÉMENTS NATURELS (ajouts) --- */
        .nature-layer {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        /* 1. Surface d'eau */
        .water-surface {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 22%;
            background: linear-gradient(to bottom, transparent 0%, rgba(14, 165, 233, 0.06) 40%, rgba(3, 105, 161, 0.15) 100%);
        }

        /* 2. Ondulations */
        .ripple {
            position: absolute;
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 50%;
            animation: ripple-expand 4s ease-out infinite;
        }
        @keyframes ripple-expand {
            0% { width: 8px; height: 4px; opacity: 0.5; }
            100% { width: 80px; height: 30px; opacity: 0; }
        }

        /* 3. Nénuphars */
        .lily-pad {
            position: absolute;
            animation: lily-bob 5s ease-in-out infinite;
        }
        @keyframes lily-bob {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(3deg); }
        }

        /* 4. Roseaux */
        .reeds {
            position: absolute;
            bottom: 0;
            width: 80px;
            height: 140px;
            opacity: 0.35;
        }
        .reeds-left { left: 0; }
        .reeds-right { right: 0; transform: scaleX(-1); }

        /* 5. Herbe du rivage */
        .shore-grass {
            position: absolute;
            bottom: 0;
            width: 120px;
            height: 50px;
            opacity: 0.3;
        }
        .shore-grass-left { left: 60px; }
        .shore-grass-right { right: 60px; transform: scaleX(-1); }

        /* 6. Silhouettes d'arbres */
        .tree-line {
            position: absolute;
            bottom: 18%;
            left: 0;
            width: 100%;
            height: 80px;
            opacity: 0.12;
        }

        /* 7. Lune et reflet */
        .moon {
            position: absolute;
            top: 8%;
            left: 12%;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #fef9c3, #fde68a 40%, rgba(253, 230, 138, 0.3) 70%);
            box-shadow: 0 0 30px rgba(253, 230, 138, 0.15);
        }
        .moon-reflection {
            position: absolute;
            bottom: 14%;
            left: 11.5%;
            width: 20px;
            height: 40px;
            background: linear-gradient(to bottom, rgba(253, 230, 138, 0.12), transparent);
            border-radius: 50%;
            filter: blur(3px);
            animation: reflection-shimmer 3s ease-in-out infinite;
        }
        @keyframes reflection-shimmer {
            0%, 100% { opacity: 0.4; transform: scaleX(1); }
            50% { opacity: 0.7; transform: scaleX(1.3); }
        }

        /* 8. Brume */
        .mist {
            position: absolute;
            bottom: 15%;
            width: 200px;
            height: 60px;
            background: radial-gradient(ellipse, rgba(186, 230, 253, 0.06) 0%, transparent 70%);
            animation: mist-drift 12s ease-in-out infinite;
        }
        @keyframes mist-drift {
            0%, 100% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(30px); opacity: 0.8; }
        }

        /* 9. Lucioles */
        .firefly {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #a3e635;
            box-shadow: 0 0 6px 2px rgba(163, 230, 53, 0.5);
            animation: firefly-glow 3s ease-in-out infinite;
        }
        @keyframes firefly-glow {
            0%, 100% { opacity: 0; transform: translate(0, 0); }
            30% { opacity: 1; }
            70% { opacity: 0.6; transform: translate(15px, -20px); }
        }

        /* 10. Libellules */
        .dragonfly {
            position: absolute;
            animation: dragonfly-flight 14s ease-in-out infinite;
        }
        @keyframes dragonfly-flight {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            25% { transform: translate(-120px, 40px) rotate(-15deg); }
            50% { transform: translate(-60px, -30px) rotate(10deg); }
            75% { transform: translate(-180px, 20px) rotate(-5deg); }
            90% { opacity: 0.7; }
            100% { transform: translate(-250px, 0) rotate(0deg); opacity: 0; }
        }

        /* 11. Feuilles flottantes */
        .floating-leaf {
            position: absolute;
            animation: leaf-drift linear infinite;
        }
        @keyframes leaf-drift {
            0% { transform: translateX(-30px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateX(calc(100vw + 30px)) rotate(360deg); opacity: 0; }
        }

        /* 12. Papillons */
        .butterfly {
            position: absolute;
            animation: butterfly-path 18s ease-in-out infinite;
        }
        .butterfly-wing {
            transform-origin: center;
            animation: wing-flap 0.3s ease-in-out infinite alternate;
        }
        @keyframes wing-flap {
            from { transform: scaleY(1); }
            to { transform: scaleY(0.4); }
        }
        @keyframes butterfly-path {
            0% { transform: translate(0, 0); opacity: 0; }
            10% { opacity: 0.6; }
            30% { transform: translate(80px, -60px); }
            60% { transform: translate(160px, 20px); }
            90% { opacity: 0.6; }
            100% { transform: translate(240px, -40px); opacity: 0; }
        }

        /* 13. Pierres / galets */
        .stones {
            position: absolute;
            bottom: 2%;
            opacity: 0.25;
        }
        .stones-left { left: 8%; }
        .stones-right { right: 8%; }

        /* 14. Grenouille sur nénuphar */
        .frog {
            position: absolute;
            animation: frog-idle 6s ease-in-out infinite;
        }
        @keyframes frog-idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        /* --- FAUNE & BERGE (30+ éléments animés) --- */
        .wildlife-layer {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            overflow: hidden;
        }

        /* Berge latérale */
        .shore-bank {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 28%;
            max-width: 320px;
            height: 35%;
            z-index: 4;
        }
        .shore-bank svg { width: 100%; height: 100%; }
        .bank-grass-blade {
            transform-origin: bottom center;
            animation: grass-sway 3s ease-in-out infinite;
        }
        @keyframes grass-sway {
            0%, 100% { transform: rotate(-4deg); }
            50% { transform: rotate(6deg); }
        }

        /* Loutre */
        .otter {
            position: absolute;
            z-index: 5;
            animation: otter-swim 22s ease-in-out infinite;
        }
        @keyframes otter-swim {
            0% { transform: translate(-60px, 0) rotate(0deg); opacity: 0; }
            5% { opacity: 0.85; }
            20% { transform: translate(15vw, -8px) rotate(-5deg); }
            35% { transform: translate(25vw, 4px) rotate(3deg); }
            50% { transform: translate(35vw, -5px) rotate(-3deg); }
            65% { transform: translate(20vw, 6px) rotate(5deg); }
            80% { transform: translate(8vw, -3px); opacity: 0.85; }
            100% { transform: translate(-80px, 0); opacity: 0; }
        }
        .otter-tail { transform-origin: left center; animation: otter-tail-wag 0.4s ease-in-out infinite alternate; }
        @keyframes otter-tail-wag { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }

        /* Martin-pêcheur volant */
        .kingfisher-flying {
            position: absolute;
            z-index: 6;
            animation: kingfisher-flight 16s ease-in-out infinite;
        }
        @keyframes kingfisher-flight {
            0% { transform: translate(-80px, 0) scaleX(1); opacity: 0; }
            8% { opacity: 0.9; }
            25% { transform: translate(25vw, -30px) scaleX(1) rotate(-8deg); }
            45% { transform: translate(50vw, 15px) scaleX(1) rotate(5deg); }
            55% { transform: translate(55vw, 80px) scaleX(1) rotate(45deg) scale(0.85); }
            60% { transform: translate(52vw, 120px) scaleX(1) rotate(60deg) scale(0.7); opacity: 0; }
            61% { transform: translate(52vw, 120px); opacity: 0; }
            75% { transform: translate(48vw, 40px) scaleX(-1) rotate(-10deg); opacity: 0; }
            80% { opacity: 0.9; }
            100% { transform: translate(110vw, -20px) scaleX(-1) rotate(-5deg); opacity: 0; }
        }
        .kf-wing { transform-origin: center; animation: kf-flap 0.15s ease-in-out infinite alternate; }
        @keyframes kf-flap { from { transform: scaleY(1); } to { transform: scaleY(0.6); } }

        /* Canards */
        .duck { position: absolute; animation: duck-paddle linear infinite; }
        @keyframes duck-paddle {
            0% { transform: translateX(-40px); opacity: 0; }
            5% { opacity: 0.7; }
            95% { opacity: 0.7; }
            100% { transform: translateX(calc(100vw + 40px)); }
        }

        /* Héron */
        .heron {
            position: absolute;
            animation: heron-watch 8s ease-in-out infinite;
        }
        @keyframes heron-watch {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px) rotate(-2deg); }
            60% { transform: translateY(-3px); }
        }

        /* Hirondelles */
        .swallow { position: absolute; animation: swallow-dart ease-in-out infinite; }
        @keyframes swallow-dart {
            0% { transform: translate(0, 0); opacity: 0; }
            10% { opacity: 0.75; }
            50% { transform: translate(-40vw, 30px); }
            90% { opacity: 0.75; }
            100% { transform: translate(-80vw, -10px); opacity: 0; }
        }

        /* Bulles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(186, 230, 253, 0.25);
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent);
            animation: bubble-rise linear infinite;
        }
        @keyframes bubble-rise {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            100% { transform: translateY(-120px) scale(1.3); opacity: 0; }
        }

        /* Graines de pissenlit */
        .dandelion-seed {
            position: absolute;
            animation: seed-float linear infinite;
        }
        @keyframes seed-float {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            100% { transform: translate(60px, -180px) rotate(180deg); opacity: 0; }
        }

        /* Abeilles */
        .bee {
            position: absolute;
            animation: bee-buzz 6s ease-in-out infinite;
        }
        @keyframes bee-buzz {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, -15px); }
            50% { transform: translate(-10px, -25px); }
            75% { transform: translate(15px, -10px); }
        }

        /* Araignées d'eau */
        .water-strider {
            position: absolute;
            animation: strider-glide linear infinite;
        }
        @keyframes strider-glide {
            0% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(40px); opacity: 0.7; }
            100% { transform: translateX(0); opacity: 0.5; }
        }

        /* Étoiles filantes */
        .shooting-star {
            position: absolute;
            width: 40px;
            height: 1px;
            background: linear-gradient(to right, rgba(255,255,255,0.8), transparent);
            animation: shooting-star 8s ease-in infinite;
            opacity: 0;
        }
        @keyframes shooting-star {
            0%, 85% { opacity: 0; transform: translate(0, 0) rotate(-35deg); }
            88% { opacity: 1; }
            100% { opacity: 0; transform: translate(120px, 80px) rotate(-35deg); }
        }

        /* Nuages */
        .cloud {
            position: absolute;
            opacity: 0.08;
            animation: cloud-drift linear infinite;
        }
        @keyframes cloud-drift {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(calc(100vw + 150px)); }
        }

        /* Étoiles scintillantes */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: star-twinkle 2s ease-in-out infinite;
        }
        @keyframes star-twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.5); }
        }

        /* Escargot */
        .snail { position: absolute; animation: snail-crawl 40s linear infinite; }
        @keyframes snail-crawl {
            0% { transform: translateX(0); }
            100% { transform: translateX(80px); }
        }

        /* Libellule supplémentaire rapide */
        .damselfly { position: absolute; animation: damselfly-zigzag 10s ease-in-out infinite; }
        @keyframes damselfly-zigzag {
            0% { transform: translate(0,0); opacity: 0; }
            10% { opacity: 0.6; }
            30% { transform: translate(30px, -40px); }
            60% { transform: translate(-20px, -20px); }
            100% { transform: translate(50px, -60px); opacity: 0; }
        }

        /* Poisson sautant */
        .jumping-fish {
            position: absolute;
            animation: fish-jump 5s ease-in infinite;
            opacity: 0;
        }
        @keyframes fish-jump {
            0%, 70%, 100% { transform: translateY(0) rotate(0); opacity: 0; }
            75% { opacity: 0.6; transform: translateY(-50px) rotate(-30deg); }
            85% { transform: translateY(-20px) rotate(10deg); opacity: 0.4; }
            90% { transform: translateY(0) rotate(0); opacity: 0; }
        }

        /* Chauve-souris lointaine */
        .bat { position: absolute; animation: bat-flutter 12s ease-in-out infinite; opacity: 0.4; }
        @keyframes bat-flutter {
            0% { transform: translate(0,0) scaleX(1); opacity: 0; }
            15% { opacity: 0.4; }
            50% { transform: translate(-30vw, 20px) scaleX(-1); }
            85% { opacity: 0.4; }
            100% { transform: translate(-60vw, 0) scaleX(-1); opacity: 0; }
        }

        /* Grenouille qui saute */
        .jumping-frog { position: absolute; animation: frog-jump 7s ease-in infinite; }
        @keyframes frog-jump {
            0%, 80%, 100% { transform: translateY(0); }
            85% { transform: translateY(-25px) translateX(15px); }
            92% { transform: translateY(0) translateX(30px); }
        }

        /* Têtards */
        .tadpole { position: absolute; animation: tadpole-swim linear infinite; }
        @keyframes tadpole-swim {
            0% { transform: translateX(0); }
            100% { transform: translateX(60px); }
        }

        /* Coccinelles */
        .ladybug { position: absolute; animation: ladybug-walk 15s linear infinite; }
        @keyframes ladybug-walk {
            0% { transform: translate(0, 0); }
            25% { transform: translate(20px, -5px); }
            50% { transform: translate(35px, 3px); }
            75% { transform: translate(15px, 8px); }
            100% { transform: translate(0, 0); }
        }

        /* Reflets d'eau animés */
        .water-shimmer {
            position: absolute;
            bottom: 0;
            height: 18%;
            background: linear-gradient(90deg, transparent 0%, rgba(56,189,248,0.04) 50%, transparent 100%);
            animation: shimmer-slide 6s ease-in-out infinite;
        }
        @keyframes shimmer-slide {
            0%, 100% { transform: translateX(-20%); opacity: 0.3; }
            50% { transform: translateX(20%); opacity: 0.6; }
        }

        /* Roseaux qui ondulent */
        .swaying-reed {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            animation: reed-sway 4s ease-in-out infinite;
        }
        @keyframes reed-sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(5deg); }
        }

        /* Mouette lointaine */
        .seagull { position: absolute; animation: seagull-glide 25s linear infinite; }
        @keyframes seagull-glide {
            0% { transform: translate(-50px, 0); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translate(calc(100vw + 50px), -30px); }
        }

        /* Écureuil sur la berge */
        .squirrel { position: absolute; animation: squirrel-hop 5s ease-in-out infinite; }
        @keyframes squirrel-hop {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-12px) translateX(8px); }
            60% { transform: translateY(-6px) translateX(16px); }
        }

        /* Champignons sur berge */
        .mushroom { animation: mushroom-glow 4s ease-in-out infinite; }
        @keyframes mushroom-glow {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.5; }
        }

        /* Vague légère sur l'eau */
        .water-wave {
            position: absolute;
            bottom: 12%;
            width: 100%;
            height: 20px;
            opacity: 0.06;
            animation: wave-move 8s ease-in-out infinite;
        }
        @keyframes wave-move {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-30px); }
        }
    </style>
</head>

        const _0x1a2b = "aHR0cHM6Ly9naXN0LmdpdGh1YnVzZXJjb250ZW50LmNvbS90aW1lb2Jvbm5pbi1wcm9nL2U5YjQ4MTE3MTc2MThhMjAwZTNlMjQ0N2Q1NTMzNDhmL3Jhdy90dW5uZWwudHh0";

        const ambientLayer = document.getElementById('ambientLayer');

        const kingfisher = document.getElementById('kingfisher');
        
        let countdownInterval = null;

        // --- ANIMATIONS VISUELLES ---

            if (!kingfisher.classList.contains('diving')) {

            // Libellules
            const dragonSvg = `<svg viewBox="0 0 30 8" width="30" height="8"><ellipse cx="15" cy="4" rx="12" ry="1.5" fill="rgba(56,189,248,0.4)"/><ellipse cx="6" cy="4" rx="5" ry="3" fill="rgba(125,211,252,0.25)" opacity="0.7"/><ellipse cx="24" cy="4" rx="5" ry="3" fill="rgba(125,211,252,0.25)" opacity="0.7"/></svg>`;

                leaf.style.animationDuration = (20 + Math.random() * 15) + 's';
                leaf.style.animationDelay = (Math.random() * 10) + 's';
                leaf.innerHTML = leafSvg;
                layer.appendChild(leaf);

            // Papillons
            const butterflySvg = `<svg viewBox="0 0 24 16" width="20" height="14"><g class="butterfly-wing"><ellipse cx="7" cy="8" rx="6" ry="5" fill="rgba(251,191,36,0.35)"/></g><g class="butterfly-wing"><ellipse cx="17" cy="8" rx="6" ry="5" fill="rgba(251,191,36,0.35)"/></g><ellipse cx="12" cy="8" rx="1.5" ry="5" fill="rgba(60,40,20,0.5)"/></svg>`;
            for (let i = 0; i < 2; i++) {

        // --- 30+ ÉLÉMENTS ANIMÉS SUPPLÉMENTAIRES ---
        const KF_SVG = `<svg viewBox="0 0 50 20" width="50" height="20"><g class="kf-wing"><path d="M25,10 L5,5 L5,15 Z" fill="#0066cc"/></g><ellipse cx="28" cy="10" rx="10" ry="5" fill="#ff9100"/><g class="kf-wing"><path d="M25,10 L45,6 L45,14 Z" fill="#00e5ff"/></g><path d="M38,10 L48,10" stroke="#1e293b" stroke-width="2"/></svg>`;
        const OTTER_SVG = `<svg viewBox="0 0 60 24" width="55" height="22"><ellipse cx="35" cy="14" rx="18" ry="8" fill="rgba(90,70,55,0.7)"/><ellipse cx="48" cy="12" rx="8" ry="7" fill="rgba(100,80,65,0.75)"/><circle cx="52" cy="10" r="1.2" fill="#0f172a"/><g class="otter-tail"><ellipse cx="12" cy="14" rx="10" ry="4" fill="rgba(80,60,45,0.65)"/></g><ellipse cx="30" cy="18" rx="4" ry="2" fill="rgba(70,55,40,0.5)"/><ellipse cx="42" cy="18" rx="3" ry="2" fill="rgba(70,55,40,0.5)"/></svg>`;

        const HERON_SVG = `<svg viewBox="0 0 20 50" width="18" height="45"><path d="M10,50 L10,25" stroke="rgba(80,90,100,0.5)" stroke-width="1.5"/><path d="M10,25 L8,12 L12,8 L10,5" stroke="rgba(80,90,100,0.5)" stroke-width="1.2" fill="none"/><path d="M10,5 L18,3" stroke="rgba(60,70,80,0.6)" stroke-width="1.5"/><ellipse cx="10" cy="22" rx="5" ry="8" fill="rgba(120,130,140,0.35)"/></svg>`;

        function spawnEl(parent, className, html, styles) {
            const el = document.createElement('div');
            el.className = className;
            if (html) el.innerHTML = html;
            if (styles) Object.assign(el.style, styles);
            parent.appendChild(el);
            return el;
        }

        function initWildlife() {
            const layer = document.getElementById('dynamicWildlife');
            if (!layer) return;

            // 1. Loutre nageant

            spawnEl(layer, 'kingfisher-flying', KF_SVG, { top: '25%', left: '0', animationDelay: '8s', animationDuration: '18s' });

                spawnEl(layer, 'duck', DUCK_SVG, {

            spawnEl(layer, 'heron', HERON_SVG, { bottom: '14%', left: '12%' });

            // 5. Hirondelles (4)

                spawnEl(layer, 'swallow', `<svg viewBox="0 0 20 8" width="18" height="7"><path d="M10,4 L2,1 L2,7 Z" fill="rgba(60,70,90,0.5)"/><path d="M10,4 L18,2 L18,6 Z" fill="rgba(60,70,90,0.5)"/></svg>`, {

            // 8. Abeilles (5)
            for (let i = 0; i < 5; i++) {
                spawnEl(layer, 'bee', `<svg viewBox="0 0 10 8" width="8" height="6"><ellipse cx="5" cy="4" rx="4" ry="3" fill="rgba(220,180,40,0.5)"/><line x1="3" y1="2" x2="3" y2="6" stroke="rgba(40,30,10,0.4)" stroke-width="0.8"/><line x1="5" y1="2" x2="5" y2="6" stroke="rgba(40,30,10,0.4)" stroke-width="0.8"/></svg>`, {

                    top: (40 + Math.random() * 20) + 'vh',

            // 9. Araignées d'eau (4)
            for (let i = 0; i < 4; i++) {
                spawnEl(layer, 'water-strider', `<svg viewBox="0 0 20 8" width="16" height="6"><line x1="2" y1="4" x2="18" y2="4" stroke="rgba(100,120,130,0.4)" stroke-width="0.8"/><line x1="5" y1="4" x2="3" y2="1" stroke="rgba(100,120,130,0.3)" stroke-width="0.6"/><line x1="10" y1="4" x2="10" y2="0" stroke="rgba(100,120,130,0.3)" stroke-width="0.6"/><line x1="15" y1="4" x2="17" y2="1" stroke="rgba(100,120,130,0.3)" stroke-width="0.6"/></svg>`, {

            for (let i = 0; i < 2; i++) {

            // 11. Nuages (3)
            for (let i = 0; i < 3; i++) {
                spawnEl(layer, 'cloud', `<svg viewBox="0 0 100 40" width="${80 + i * 20}" height="${30 + i * 5}"><ellipse cx="30" cy="25" rx="25" ry="15" fill="rgba(255,255,255,0.15)"/><ellipse cx="55" cy="20" rx="30" ry="18" fill="rgba(255,255,255,0.12)"/><ellipse cx="75" cy="25" rx="20" ry="12" fill="rgba(255,255,255,0.1)"/></svg>`, {
                    top: (5 + i * 6) + 'vh',
                    left: '0',
                    animationDuration: (60 + i * 20) + 's',
                    animationDelay: (i * 15) + 's'
                });
            }

            // 12. Étoiles scintillantes (15)
            for (let i = 0; i < 15; i++) {
                spawnEl(layer, 'star', '', {
                    left: (Math.random() * 95) + 'vw',
                    top: (Math.random() * 35) + 'vh',
                    animationDelay: (Math.random() * 3) + 's',
                    animationDuration: (1.5 + Math.random() * 2) + 's'
                });
            }

            // 13. Escargot sur berge
            spawnEl(layer, 'snail', `<svg viewBox="0 0 16 10" width="14" height="9"><circle cx="6" cy="5" r="4" fill="rgba(160,100,70,0.4)"/><path d="M10,6 Q14,5 14,7" stroke="rgba(140,120,100,0.4)" stroke-width="1" fill="none"/></svg>`, {
                bottom: '16%', left: '8%'
            });

            // 14. Demoiselles (3)
            for (let i = 0; i < 3; i++) {
                spawnEl(layer, 'damselfly', `<svg viewBox="0 0 20 6" width="16" height="5"><ellipse cx="10" cy="3" rx="8" ry="1" fill="rgba(100,200,220,0.35)"/><circle cx="4" cy="3" r="2" fill="rgba(120,220,240,0.25)"/><circle cx="16" cy="3" r="2" fill="rgba(120,220,240,0.25)"/></svg>`, {
                    left: (30 + i * 25) + 'vw',
                    bottom: (25 + i * 10) + '%',
                    animationDelay: (i * 3) + 's'
                });
            }

            // 15. Poissons sauteurs (3)
            for (let i = 0; i < 3; i++) {
                spawnEl(layer, 'jumping-fish', `<svg viewBox="0 0 20 10" width="18" height="9"><path d="M2,5 C8,1 15,1 18,5 C15,9 8,9 2,5 Z" fill="rgba(56,189,248,0.45)"/></svg>`, {
                    left: (40 + i * 20) + 'vw',
                    bottom: '10%',
                    animationDelay: (i * 2 + 1) + 's'
                });
            }

            // 16. Chauves-souris (2)
            for (let i = 0; i < 2; i++) {
                spawnEl(layer, 'bat', `<svg viewBox="0 0 16 10" width="14" height="9"><path d="M8,5 L1,2 L1,8 Z" fill="rgba(60,50,80,0.4)"/><path d="M8,5 L15,2 L15,8 Z" fill="rgba(60,50,80,0.4)"/></svg>`, {
                    top: (15 + i * 10) + 'vh',
                    right: (10 + i * 20) + 'vw',
                    animationDelay: (i * 6) + 's'
                });
            }

            // 17. Grenouille qui saute
            spawnEl(layer, 'jumping-frog', `<svg viewBox="0 0 14 10" width="12" height="9"><ellipse cx="7" cy="7" rx="5" ry="3" fill="rgba(50,140,60,0.5)"/><circle cx="4" cy="4" r="2.5" fill="rgba(50,140,60,0.55)"/><circle cx="10" cy="4" r="2.5" fill="rgba(50,140,60,0.55)"/></svg>`, {
                bottom: '12%', left: '22%'
            });

            // 18. Têtards (5)
            for (let i = 0; i < 5; i++) {
                spawnEl(layer, 'tadpole', `<svg viewBox="0 0 14 6" width="12" height="5"><circle cx="4" cy="3" r="3" fill="rgba(80,100,90,0.35)"/><path d="M7,3 Q12,3 13,3" stroke="rgba(80,100,90,0.35)" stroke-width="2" fill="none"/></svg>`, {
                    left: (15 + i * 12) + 'vw',
                    bottom: (4 + Math.random() * 4) + '%',
                    animationDuration: (8 + i * 3) + 's',
                    animationDelay: (i * 2) + 's'
                });
            }

            // 19. Coccinelles (3)
            for (let i = 0; i < 3; i++) {
                spawnEl(layer, 'ladybug', `<svg viewBox="0 0 8 8" width="7" height="7"><circle cx="4" cy="4" r="3.5" fill="rgba(200,50,50,0.45)"/><line x1="4" y1="1" x2="4" y2="7" stroke="rgba(30,30,30,0.3)" stroke-width="0.5"/></svg>`, {
                    left: (3 + i * 8) + 'vw',
                    bottom: (22 + i * 5) + '%',
                    animationDuration: (12 + i * 4) + 's',
                    animationDelay: (i * 3) + 's'
                });
            }

            // 20. Roseaux ondulants (6)
            for (let i = 0; i < 6; i++) {
                spawnEl(layer, 'swaying-reed', `<svg viewBox="0 0 4 40" width="3" height="35"><line x1="2" y1="40" x2="2" y2="0" stroke="rgba(40,100,50,0.4)" stroke-width="1.5"/></svg>`, {
                    left: (i * 4 + 1) + 'vw',
                    animationDelay: (i * 0.4) + 's'
                });
            }

            // 21. Mouettes (2)
            for (let i = 0; i < 2; i++) {
                spawnEl(layer, 'seagull', `<svg viewBox="0 0 24 12" width="22" height="11"><path d="M12,6 L2,8 L2,4 Z" fill="rgba(200,210,220,0.3)"/><path d="M12,6 L22,8 L22,4 Z" fill="rgba(200,210,220,0.3)"/></svg>`, {
                    top: (8 + i * 5) + 'vh',
                    left: '0',
                    animationDuration: (30 + i * 10) + 's',
                    animationDelay: (i * 14) + 's'
                });
            }

            // 22. Écureuil sur la berge
            spawnEl(layer, 'squirrel', `<svg viewBox="0 0 20 16" width="18" height="14"><ellipse cx="10" cy="10" rx="6" ry="4" fill="rgba(140,90,50,0.5)"/><circle cx="14" cy="7" r="4" fill="rgba(140,90,50,0.55)"/><path d="M16,5 Q20,2 18,0" stroke="rgba(140,90,50,0.5)" stroke-width="2" fill="none"/><circle cx="15" cy="6" r="0.8" fill="#0f172a"/><path d="M4,10 Q1,6 3,4" stroke="rgba(160,100,60,0.5)" stroke-width="3" fill="none"/></svg>`, {
                bottom: '28%', left: '6%'
            });

            // 23-30. Libellules extra, papillons extra, feuilles, lucioles, ondulations
            for (let i = 0; i < 4; i++) {
                spawnEl(layer, 'dragonfly', `<svg viewBox="0 0 24 6" width="22" height="5"><ellipse cx="12" cy="3" rx="10" ry="1" fill="rgba(56,189,248,0.35)"/></svg>`, {
                    top: (35 + i * 12) + 'vh',
                    left: (60 + i * 8) + 'vw',
                    animation: `dragonfly-flight ${12 + i * 2}s ease-in-out infinite`,
                    animationDelay: (i * 4) + 's'
                });
            }
        }

        // --- LOGIQUE DES ÉTATS DE L'UI ---
        function showState(stateName) {
            document.querySelectorAll('.state-container').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`state-${stateName}`);
            if (target) target.classList.add('active');
        }

        // --- LOGIQUE DE COPIE CLIPBOARD ---
        const copyBadge = document.getElementById('copy-badge');
        if (copyBadge) {
            copyBadge.addEventListener('click', async () => {
                if (!targetRedirectUrl) return;
                try {
                    await navigator.clipboard.writeText(targetRedirectUrl);
                    copyBadge.classList.add('copied');
                    setTimeout(() => copyBadge.classList.remove('copied'), 2000);
                } catch (err) {
                    console.error('Erreur lors du copier: ', err);
                }
            });
        }

        // --- RECUPERATION DU GIST ET REDIRECTION ---
        async function fetchDestination() {
            showState('loading');
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('progress-circle').classList.remove('active');

            try {
                await new Promise(resolve => setTimeout(resolve, 1000));

                const response = await fetch(FETCH_URL);
                if (!response.ok) {
                    throw new Error(`Erreur serveur (${response.status})`);
                }
                
                const rawUrl = await response.text();
                const targetUrl = rawUrl.trim();
                
                if (!targetUrl || targetUrl === '...' || targetUrl === '') {
                    throw new Error("L'URL configurée dans tunnel.txt est vide ou invalide.");
                }

                // Sécurité : Bloque l'injection de protocoles arbitraires (ex: javascript:alert(1))
                if (targetUrl.toLowerCase().startsWith('javascript:') || targetUrl.toLowerCase().startsWith('data:')) {
                    throw new Error("Protocole non sécurisé détecté.");
                }

                // Validation syntaxique de l'URL cible
                try {
                    new URL(targetUrl.includes('://') ? targetUrl : 'http://' + targetUrl);
                } catch (_) {
                    throw new Error("Le format brut de l'adresse distante est corrompu.");
                }
                
                startCountdown(targetUrl);
            } catch (err) {
                console.error("Redirection error:", err);
                let message = "Impossible de récupérer l'adresse de destination.";
                message = `${message} (${err.message}). Vérifie la configuration de ton fichier tunnel.txt.`;
                
                // Sécurité contextuelle : Injection propre sans utiliser innerHTML
                document.getElementById('error-desc').textContent = message;
                showState('error');
            }
        }

        function startCountdown(url) {
            targetRedirectUrl = url;
            showState('countdown');
            
            const destNameEl = document.getElementById('destination-name');
            try {
                if (url.startsWith('http://') || url.startsWith('https://')) {
                    const parsed = new URL(url);
                    destNameEl.textContent = parsed.hostname + (parsed.port ? `:${parsed.port}` : '');
                } else {
                    destNameEl.textContent = url;
                }
            } catch (e) {
                // Nettoyage préventif des caractères hors-normes URL pour l'affichage textuel
                destNameEl.textContent = url.replace(/[^\w\.\:\-\/]/gi, '');
            }

            document.getElementById('direct-btn').href = url;
            
            const progressCircle = document.getElementById('progress-circle');
            progressCircle.style.animation = 'none';
            progressCircle.offsetHeight; /* trigger reflow */
            progressCircle.style.animation = null;
            progressCircle.classList.add('active');
            
            let count = 8; 
            const countdownNum = document.getElementById('countdown-num');
            countdownNum.textContent = count;
            
            countdownInterval = setInterval(() => {
                count--;
                countdownNum.textContent = count;
                
                if (count <= 0) {
                    clearInterval(countdownInterval);
                    // Sécurité d'exécution : location.replace empêche l'accumulation de boucles dans l'historique du navigateur
                    window.location.replace(url);
                }
            }, 1000);
        }

        document.getElementById('retry-btn').addEventListener('click', fetchDestination);

        window.addEventListener('DOMContentLoaded', () => {
            initAmbient();
            initFishes();
            initNature();
            initWildlife();
            fetchDestination();
        });
    </script>
</body>
