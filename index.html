<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Birdnet-Go — Le Lac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        html { display: none; }
    </style>
    <script>
        if (self === top) {
            document.documentElement.style.display = 'block';
        } else {
            top.location = self.location;
        }
    </script>

    <style>
        :root {
            --ink: #020617;
            --lake: #0f172a;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #5eead4;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 20%, #1e293b 0%, #020617 60%);
            font-family: "Inter", sans-serif;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        /* --- SCÈNE MINIMALISTE --- */
        .scene {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Ciel */
        .stars {
            position: absolute;
            inset: 0;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 4s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.4); }
        }

        /* Lune */
        .moon {
            position: absolute;
            top: 10%;
            left: 14%;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f8fafc;
            opacity: 0.85;
            box-shadow: 0 0 40px rgba(248, 250, 252, 0.08);
        }
        .moon-reflection {
            position: absolute;
            top: 10%;
            left: 14%;
            width: 32px;
            height: 120px;
            background: linear-gradient(to bottom, rgba(248,250,252,0.06), transparent);
            transform: translateY(32px);
            filter: blur(8px);
            animation: shimmer 5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0.4; transform: translateY(32px) scaleX(1); }
            50% { opacity: 0.7; transform: translateY(32px) scaleX(1.2); }
        }

        /* Horizon & Eau */
        .horizon {
            position: absolute;
            bottom: 22%;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(148,163,184,0.15), transparent);
        }

        .water {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 22%;
            background: linear-gradient(to bottom, rgba(15,23,42,0.2), rgba(2,6,23,0.6));
            overflow: hidden;
        }
        .water::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(94,234,212,0.03) 50%, transparent 100%);
            animation: wave-slide 10s ease-in-out infinite;
        }
        @keyframes wave-slide {
            0%, 100% { transform: translateX(-30%); }
            50% { transform: translateX(30%); }
        }

        .water-ripple {
            position: absolute;
            bottom: 20%;
            left: 50%;
            width: 200px;
            height: 6px;
            border-radius: 50%;
            border: 1px solid rgba(94,234,212,0.08);
            animation: ripple 6s ease-out infinite;
            transform: translateX(-50%);
        }
        @keyframes ripple {
            0% { width: 0; opacity: 0.5; }
            100% { width: 300px; opacity: 0; }
        }

        /* Brume basse */
        .mist {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: radial-gradient(ellipse at 50% 100%, rgba(148,163,184,0.04) 0%, transparent 70%);
            animation: mist-breathe 12s ease-in-out infinite;
        }
        @keyframes mist-breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Poissons */
        .fish {
            position: absolute;
            bottom: 8%;
            opacity: 0.25;
            animation: swim 18s linear infinite;
        }
        @keyframes swim {
            0% { transform: translateX(-60px) scaleX(-1); }
            100% { transform: translateX(110vw) scaleX(-1); }
        }

        /* Perch & Martin-pêcheur */
        .perch-line {
            position: absolute;
            top: 190px;
            right: 0;
            width: 160px;
            height: 1px;
            background: linear-gradient(to left, rgba(226,232,240,0.1), transparent);
            z-index: 5;
        }

        .kingfisher {
            position: absolute;
            top: 155px;
            right: 50px;
            width: 70px;
            height: 70px;
            z-index: 10;
            cursor: pointer;
            transform: scaleX(-1);
            animation: breathe 5s ease-in-out infinite;
            transition: transform 0.3s ease;
            pointer-events: auto;
        }
        @keyframes breathe {
            0%, 100% { transform: scaleX(-1) translateY(0); }
            50% { transform: scaleX(-1) translateY(-2px); }
        }
        .kingfisher.diving {
            animation: dive 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes dive {
            0% { transform: scaleX(-1) translate(0,0) rotate(0); }
            30% { transform: scaleX(-1) translate(-120px, 300px) rotate(-50deg) scale(0.9); }
            50% { transform: scaleX(-1) translate(-140px, 310px) rotate(-20deg) scale(0.9); }
            100% { transform: scaleX(-1) translate(0,0) rotate(0); }
        }

        /* Particules */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(226,232,240,0.25);
            border-radius: 50%;
            animation: float 10s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(10vh) translateX(0); opacity: 0; }
            30% { opacity: 0.4; }
            100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
        }

        /* --- INTERFACE --- */
        .container {
            position: relative;
            z-index: 20;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 24px;
            pointer-events: none;
        }

        .card {
            width: 100%;
            max-width: 360px;
            padding: 40px 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: enter 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: auto;
        }
        @keyframes enter {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(94, 234, 212, 0.06);
            border: 1px solid rgba(94, 234, 212, 0.12);
            color: var(--accent);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-family: "Outfit", sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: #fff;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 20px;
            font-weight: 300;
        }

        .state { display: none; width: 100%; flex-direction: column; align-items: center; }
        .state.active { display: flex; }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255,255,255,0.04);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 32px 0;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 300;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 100px;
            margin-bottom: 24px;
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: "Inter", sans-serif;
        }
        .badge:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(94,234,212,0.15);
        }
        .badge .check { display: none; stroke: #34d399; }
        .badge.copied .copy-icon { display: none; }
        .badge.copied .check { display: inline; }

        .wheel {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wheel svg circle:first-child { stroke: rgba(255,255,255,0.04); }
        .wheel .progress {
            stroke-dasharray: 88.0;
            stroke-dashoffset: 0;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 1s linear;
        }
        .wheel .progress.active { animation: countdown 8s linear forwards; }
        @keyframes countdown { to { stroke-dashoffset: 88.0; } }
        .wheel .num {
            position: absolute;
            font-size: 1.8rem;
            font-weight: 400;
            color: #fff;
            font-family: "Outfit", sans-serif;
        }

        .caption {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 20px;
            font-weight: 300;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255,255,255,0.92);
            color: #020617;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover {
            background: #fff;
            transform: translateY(-1px);
        }
        .btn.retry {
            background: rgba(239,68,68,0.08);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.15);
        }
        .btn.retry:hover {
            background: rgba(239,68,68,0.14);
            color: #fff;
        }

        .error-icon {
            color: var(--error);
            margin: 16px 0 10px;
        }
        .error-title {
            font-size: 1.1rem;
            color: var(--error);
            font-weight: 600;
            margin-bottom: 6px;
        }
        .error-desc {
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.4;
            margin-bottom: 18px;
            font-weight: 300;
        }

        /* Rêverbe */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(94,234,212,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="glow"></div>
        <div class="stars" id="stars"></div>
        <div class="moon"></div>
        <div class="moon-reflection"></div>
        <div class="horizon"></div>
        <div class="water">
            <div class="water-ripple" style="animation-delay: 0s;"></div>
            <div class="water-ripple" style="animation-delay: 3s; bottom: 18%; left: 30%;"></div>
        </div>
        <div class="mist"></div>
        <div id="fishLayer"></div>
        <div id="particleLayer"></div>
    </div>

    <div class="perch-line"></div>

    <div class="kingfisher" id="kingfisher" title="Cliquez pour plonger">
        <svg viewBox="0 0 120 120" width="100%" height="100%">
            <defs>
                <linearGradient id="kfb" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#0ea5e9"/>
                    <stop offset="100%" stop-color="#0f172a"/>
                </linearGradient>
                <linearGradient id="kfo" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#f59e0b"/>
                    <stop offset="100%" stop-color="#7c2d12"/>
                </linearGradient>
            </defs>
            <path d="M50,42 C64,42 74,56 72,80 C70,90 62,98 52,98 C44,88 43,68 50,42 Z" fill="url(#kfo)"/>
            <path d="M46,26 C60,26 64,34 63,44 C56,56 48,70 46,94 L39,96 L37,84 C34,64 36,41 46,26 Z" fill="url(#kfb)"/>
            <path d="M46,26 C57,26 63,33 62,42 C55,40 50,35 46,26 Z" fill="#38bdf8"/>
            <path d="M60,38 L100,42 L59,44 Z" fill="#1e293b"/>
            <circle cx="54" cy="35" r="2" fill="#fff"/>
            <circle cx="54" cy="35" r="0.9" fill="#0f172a"/>
        </svg>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>
                </svg>
            </div>

            <h1>Birdnet-Go Timéo</h1>

            <div id="state-loading" class="state active">
                <div class="spinner"></div>
                <p class="status">Connexion au lac en cours...</p>
            </div>

            <div id="state-countdown" class="state">
                <p class="subtitle">Vous allez être redirigé vers</p>

                <button id="copy-badge" type="button" class="badge" title="Copier l'adresse">
                    <span>🔗</span>
                    <span id="destination-name">...</span>
                    <span style="display:inline-flex;align-items:center;">
                        <svg class="copy-icon" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        <svg class="check" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </span>
                </button>

                <div class="wheel">
                    <svg viewBox="0 0 36 36" width="80" height="80">
                        <circle cx="18" cy="18" r="14" fill="none" stroke-width="2"/>
                        <circle id="progress-circle" class="progress" cx="18" cy="18" r="14" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <div class="num" id="countdown-num">8</div>
                </div>

                <p class="caption">Redirection automatique...</p>

                <a id="direct-btn" href="#" class="btn" rel="noopener noreferrer">
                    <span>Y aller maintenant</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </svg>
                </a>
            </div>

            <div id="state-error" class="state">
                <div class="error-icon">
                    <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <h3 class="error-title">Lac introuvable</h3>
                <p class="error-desc" id="error-desc">Impossible de joindre le serveur de redirection.</p>
                <button id="retry-btn" type="button" class="btn retry">Réessayer</button>
            </div>
        </div>
    </div>

    <script>
        const _0x1a2b = "aHR0cHM6Ly9naXN0LmdpdGh1YnVzZXJjb250ZW50LmNvbS90aW1lb2Jvbm5pbi1wcm9nL2U5YjQ4MTE3MTc2MThhMjAwZTNlMjQ0N2Q1NTMzNDhmL3Jhdy90dW5uZWwudHh0";
        const FETCH_URL = window.atob(_0x1a2b);

        const kingfisher = document.getElementById('kingfisher');
        let countdownInterval = null;
        let targetRedirectUrl = '';

        function initScene() {
            // Étoiles
            const stars = document.getElementById('stars');
            for (let i = 0; i < 20; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 40 + 'vh';
                s.style.animationDelay = Math.random() * 4 + 's';
                s.style.animationDuration = (3 + Math.random() * 3) + 's';
                stars.appendChild(s);
            }

            // 2 poissons lents
            const fishLayer = document.getElementById('fishLayer');
            for (let i = 0; i < 2; i++) {
                const f = document.createElement('div');
                f.className = 'fish';
                f.style.bottom = (4 + i * 3) + '%';
                f.style.animationDuration = (20 + i * 8) + 's';
                f.style.animationDelay = (i * 6) + 's';
                f.innerHTML = `<svg viewBox="0 0 28 12" width="24" height="10"><path d="M2,6 C10,2 20,2 24,6 C20,10 10,10 2,6 Z" fill="rgba(56,189,248,0.25)"/><path d="M24,6 L28,3 L27,9 Z" fill="rgba(56,189,248,0.15)"/></svg>`;
                fishLayer.appendChild(f);
            }

            // Particules d'ambiance
            const pLayer = document.getElementById('particleLayer');
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (12 + Math.random() * 8) + 's';
                p.style.animationDelay = Math.random() * 6 + 's';
                pLayer.appendChild(p);
            }
        }

        function dive() {
            if (!kingfisher.classList.contains('diving')) {
                kingfisher.classList.add('diving');
                setTimeout(() => kingfisher.classList.remove('diving'), 2000);
            }
        }
        kingfisher.addEventListener('click', (e) => { e.stopPropagation(); dive(); });
        setInterval(dive, 16000);

        function showState(name) {
            document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
            const s = document.getElementById('state-' + name);
            if (s) s.classList.add('active');
        }

        const copyBadge = document.getElementById('copy-badge');
        copyBadge.addEventListener('click', async () => {
            if (!targetRedirectUrl) return;
            try {
                await navigator.clipboard.writeText(targetRedirectUrl);
                copyBadge.classList.add('copied');
                setTimeout(() => copyBadge.classList.remove('copied'), 2000);
            } catch (err) { console.error('Copier échoué', err); }
        });

        async function fetchDestination() {
            showState('loading');
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('progress-circle').classList.remove('active');

            try {
                await new Promise(r => setTimeout(r, 900));
                const res = await fetch(FETCH_URL);
                if (!res.ok) throw new Error(`Erreur serveur (${res.status})`);

                const raw = await res.text();
                const url = raw.trim();

                if (!url || url === '...') throw new Error("L'URL configurée est vide.");
                if (/^(javascript|data):/i.test(url)) throw new Error("Protocole non sécurisé.");
                new URL(url.includes('://') ? url : 'http://' + url);

                startCountdown(url);
            } catch (err) {
                console.error(err);
                document.getElementById('error-desc').textContent =
                    `Impossible de récupérer l'adresse de destination. (${err.message}) Vérifie la configuration de tunnel.txt.`;
                showState('error');
            }
        }

        function startCountdown(url) {
            targetRedirectUrl = url;
            showState('countdown');

            const dest = document.getElementById('destination-name');
            try {
                const u = new URL(url.startsWith('http') ? url : 'http://' + url);
                dest.textContent = u.hostname + (u.port ? ':' + u.port : '');
            } catch (e) {
                dest.textContent = url.replace(/[^\w\.\:\-\/]/gi, '');
            }

            document.getElementById('direct-btn').href = url;

            const pc = document.getElementById('progress-circle');
            pc.style.animation = 'none';
            pc.offsetHeight;
            pc.style.animation = null;
            pc.classList.add('active');

            let count = 8;
            const num = document.getElementById('countdown-num');
            num.textContent = count;

            countdownInterval = setInterval(() => {
                count--;
                num.textContent = count;
                if (count <= 0) {
                    clearInterval(countdownInterval);
                    window.location.replace(url);
                }
            }, 1000);
        }

        document.getElementById('retry-btn').addEventListener('click', fetchDestination);

        window.addEventListener('DOMContentLoaded', () => {
            initScene();
            fetchDestination();
        });
    </script>
</body>
</html>
